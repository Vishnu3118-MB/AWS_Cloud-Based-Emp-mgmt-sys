<!DOCTYPE html>

<html>
<head>
    <title>Add Employee</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="sidebar">

<h2>EMS</h2>

<ul>
    <li><a href="/dashboard">🏠 Dashboard</a></li>
    <li><a href="/add-employee">➕ Add Employee</a></li>
    <li><a href="/employees">👨‍💼 Employees</a></li>
</ul>

</div>

<div class="main-content">

<div class="welcome-banner">
    <h2>Add New Employee 👨‍💼</h2>
    <p>Create and manage employee records</p>
</div>

<h1 class="page-title">Add Employee</h1>

<form method="POST">

    <div class="form-grid">

        <div class="form-group">
            <label>Employee Name</label>
            <input
                type="text"
                name="emp_name"
                placeholder="Employee Name"
                required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Email"
                required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required>
        </div>

        <div class="form-group">
            <label>Department</label>

            <select name="dept_id" required>
                <option value="">
                    Select Department
                </option>

                {% for dept in departments %}
                <option value="{{ dept[0] }}">
                    {{ dept[1] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input
                type="text"
                name="designation"
                placeholder="Designation"
                required>
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input
                type="number"
                name="salary"
                placeholder="Salary"
                required>
        </div>

        <div class="form-group">
            <label>Joining Date</label>
            <input
                type="date"
                name="joining_date"
                required>
        </div>

    </div>

    <br>

    <button class="btn" type="submit">
        Save Employee
    </button>

</form>

</div>

</body>
</html>
