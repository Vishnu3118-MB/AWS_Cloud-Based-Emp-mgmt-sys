<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-content">

    <h1>Edit Employee</h1>

    <a href="/employees">← Back to Employees</a>

    <br><br>

    <form method="POST">

        <label>Employee Name</label>
        <br>
        <input type="text"
               name="emp_name"
               value="{{ employee[1] }}"
               required>
        <br><br>

        <label>Email</label>
        <br>
        <input type="email"
               name="email"
               value="{{ employee[2] }}"
               required>
        <br><br>

        <label>Phone Number</label>
        <br>
        <input type="text"
               name="phone"
               value="{{ employee[3] }}"
               required>
        <br><br>

        <label>Department</label>
        <br>

        <select name="dept_id" required>

            {% for dept in departments %}

            <option value="{{ dept[0] }}"
            {% if dept[0] == employee[4] %}
                selected
            {% endif %}
            >
                {{ dept[1] }}
            </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Designation</label>
        <br>
        <input type="text"
               name="designation"
               value="{{ employee[5] }}"
               required>
        <br><br>

        <label>Salary</label>
        <br>
        <input type="number"
               name="salary"
               value="{{ employee[6] }}"
               required>
        <br><br>

        <label>Joining Date</label>
        <br>
        <input type="date"
               name="joining_date"
               value="{{ employee[7] }}"
               required>

        <br><br>

        <button class="btn" type="submit">
            Update Employee
        </button>

    </form>

</div>

</body>
</html>
